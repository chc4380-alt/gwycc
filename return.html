<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>들락날락 — 반납</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --g1:#1a6b3c;--g2:#2d9d5c;--g3:#e8f5ee;--g4:#f0faf4;
  --red:#dc2626;--red2:#fef2f2;
  --acc:#f59e0b;--acc2:#fef3c7;
  --blue:#1d6fb5;
  --txt:#111827;--txt2:#6b7280;
  --bg:#ffffff;--bg2:#f9fafb;--bd:#e5e7eb;
  --r:14px;--rs:8px;
  --sh:0 2px 12px rgba(0,0,0,.08);--shl:0 8px 32px rgba(0,0,0,.14);
}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f0;color:var(--txt);min-height:100vh;-webkit-tap-highlight-color:transparent;}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;background:#f0f4f0;}

/* HEADER */
.hdr{background:var(--red);position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(220,38,38,.3);}
.hdr-in{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;}
.brand{font-family:'Black Han Sans',sans-serif;font-size:22px;color:#fff;letter-spacing:2px;line-height:1;}
.brand-sub{font-size:10px;color:rgba(255,255,255,.8);margin-top:3px;}
.clk-t{font-size:20px;font-weight:900;color:#fff;letter-spacing:2px;font-variant-numeric:tabular-nums;text-align:right;}
.clk-d{font-size:10px;color:rgba(255,255,255,.75);margin-top:2px;text-align:right;}

/* BODY */
.body{padding:16px 14px 40px;}
.conn-row{display:flex;align-items:center;margin-bottom:14px;font-size:11px;color:var(--txt2);}
.conn-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px;}
.conn-ok{background:#22c55e;}.conn-err{background:#ef4444;}.conn-ing{background:#f59e0b;}

/* PAGE TITLE */
.page-title{background:var(--bg);border-radius:var(--r);padding:16px;margin-bottom:14px;box-shadow:var(--sh);text-align:center;}
.page-title .icon{font-size:40px;margin-bottom:8px;}
.page-title h1{font-size:20px;font-weight:900;color:var(--red);}
.page-title p{font-size:13px;color:var(--txt2);margin-top:4px;}

/* ACTIVE LIST */
.sec-label{font-size:11px;font-weight:700;color:var(--txt2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;padding-left:2px;}
.fac-section{margin-bottom:16px;}
.fac-header{background:var(--g1);color:white;padding:8px 14px;border-radius:10px 10px 0 0;font-size:13px;font-weight:700;}
.fac-header.red-hdr{background:var(--red);}
.fac-header.blue-hdr{background:var(--blue);}
.fac-header.purple-hdr{background:#7c3aed;}
.fac-header.amber-hdr{background:#b45309;}
.active-item{background:var(--bg);border:1px solid var(--bd);border-top:none;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.active-item:last-child{border-radius:0 0 10px 10px;}
.ai-info{flex:1;}
.ai-name{font-size:14px;font-weight:700;}
.ai-meta{font-size:11px;color:var(--txt2);margin-top:2px;}
.ai-booth{font-size:11px;font-weight:600;color:var(--g1);background:var(--g3);padding:2px 8px;border-radius:20px;white-space:nowrap;}
.return-btn{background:var(--red);color:white;border:none;border-radius:8px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;transition:background .12s;}
.return-btn:hover{background:#b91c1c;}
.return-btn:active{background:#991b1b;}

/* EMPTY */
.empty-box{background:var(--bg);border-radius:var(--r);padding:30px;text-align:center;box-shadow:var(--sh);color:var(--txt2);font-size:14px;}
.empty-box .ei{font-size:40px;margin-bottom:10px;}

/* PC SECTION */
.pc-grid-r{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px;}
.pc-tile-r{background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:12px 8px;text-align:center;}
.pc-tile-r.busy{border-color:#fca5a5;background:var(--red2);}
.pc-tile-r.free{border-color:#86efac;background:var(--g3);}
.pt-num{font-size:22px;font-weight:900;}
.pc-tile-r.busy .pt-num{color:var(--red);}
.pc-tile-r.free .pt-num{color:var(--g1);}
.pt-user{font-size:10px;color:var(--txt2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pt-btn{margin-top:7px;}
.pt-btn button{background:var(--red);color:white;border:none;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;width:100%;}
.pt-btn button:hover{background:#b91c1c;}

/* CONFIRM MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:20px;}
.ov.open{display:flex;}
.mbox{background:var(--bg);border-radius:18px;width:100%;max-width:360px;overflow:hidden;box-shadow:var(--shl);animation:mIn .2s ease;}
@keyframes mIn{from{transform:scale(.95);opacity:0}to{transform:scale(1);opacity:1}}
.mhd{padding:18px 20px;background:var(--red);color:white;}
.mhd h3{font-size:16px;font-weight:700;}
.mhd p{font-size:12px;opacity:.85;margin-top:3px;}
.mbdy{padding:20px;}
.confirm-info{background:var(--red2);border:1px solid #fca5a5;border-radius:10px;padding:14px;margin-bottom:16px;}
.ci-name{font-size:18px;font-weight:900;color:var(--red);}
.ci-meta{font-size:12px;color:#b91c1c;margin-top:4px;}
.btn-row{display:flex;gap:8px;}
.btn-confirm{flex:1;padding:13px;background:var(--red);color:white;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-confirm:hover{background:#b91c1c;}
.btn-cancel{flex:1;padding:13px;background:var(--bg2);color:var(--txt);border:1.5px solid var(--bd);border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* SUCCESS ANIMATION */
.success-overlay{display:none;position:fixed;inset:0;background:rgba(26,107,60,.9);z-index:300;align-items:center;justify-content:center;flex-direction:column;}
.success-overlay.show{display:flex;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.success-icon{font-size:80px;animation:bounce .5s ease;}
@keyframes bounce{0%{transform:scale(.5)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.success-text{font-size:24px;font-weight:900;color:white;margin-top:16px;}
.success-sub{font-size:14px;color:rgba(255,255,255,.8);margin-top:8px;}

/* TOAST */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:#1f2937;color:white;padding:11px 20px;border-radius:30px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:all .25s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">
  <header class="hdr">
    <div class="hdr-in">
      <div>
        <div class="brand">🔄 들락날락 반납</div>
        <div class="brand-sub">광양시청소년문화센터 · 시설 반납 전용</div>
      </div>
      <div>
        <div class="clk-t" id="clk-t">--:--:--</div>
        <div class="clk-d" id="clk-d"></div>
      </div>
    </div>
  </header>

  <div class="body">
    <div class="conn-row">
      <span class="conn-dot conn-ing" id="conn-dot"></span>
      <span id="conn-txt">서버 연결 중...</span>
    </div>

    <div class="page-title">
      <div class="icon">🔄</div>
      <h1>시설 반납</h1>
      <p>이용이 끝났으면 반납 버튼을 눌러주세요</p>
    </div>

    <div class="sec-label">현재 이용 중인 시설</div>
    <div id="active-list"></div>
  </div>
</div>

<!-- 반납 확인 모달 -->
<div class="ov" id="ov-confirm">
  <div class="mbox">
    <div class="mhd">
      <h3>🔄 반납 확인</h3>
      <p>아래 이용자의 시설을 반납하시겠습니까?</p>
    </div>
    <div class="mbdy">
      <div class="confirm-info">
        <div class="ci-name" id="confirm-name">-</div>
        <div class="ci-meta" id="confirm-meta">-</div>
      </div>
      <div class="btn-row">
        <button class="btn-cancel" onclick="closeConfirm()">취소</button>
        <button class="btn-confirm" onclick="doReturn()">✅ 반납하기</button>
      </div>
    </div>
  </div>
</div>

<!-- 성공 애니메이션 -->
<div class="success-overlay" id="success-overlay">
  <div class="success-icon">✅</div>
  <div class="success-text">반납 완료!</div>
  <div class="success-sub" id="success-sub">감사합니다</div>
</div>

<div class="toast" id="toast"></div>

<script>
const SERVER = 'https://gwycc-production.up.railway.app';
let state = { records: [], pcStatus: {}, pcQueue: [] };
let pendingReturn = null; // { facility, booth, name, recordId }

window.onload = () => {
  tickClock(); setInterval(tickClock, 1000);
  connectSSE();
  document.getElementById('ov-confirm').addEventListener('click', e => {
    if (e.target === document.getElementById('ov-confirm')) closeConfirm();
  });
};

function connectSSE() {
  setConn('ing', '서버 연결 중...');
  const sse = new EventSource(`${SERVER}/events`);
  sse.addEventListener('init', e => { state = JSON.parse(e.data); renderList(); setConn('ok', '실시간 연결됨 ✓'); });
  sse.addEventListener('update', e => { state = JSON.parse(e.data); renderList(); });
  sse.onerror = () => { setConn('err', '재연결 중...'); setTimeout(connectSSE, 3000); };
}
function setConn(t, m) {
  document.getElementById('conn-dot').className = 'conn-dot conn-' + t;
  document.getElementById('conn-txt').textContent = m;
}

function tickClock() {
  const n = new Date();
  document.getElementById('clk-t').textContent = n.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  const days = ['일', '월', '화', '수', '목', '금', '토'];
  document.getElementById('clk-d').textContent = `${n.getFullYear()}년 ${n.getMonth() + 1}월 ${n.getDate()}일 (${days[n.getDay()]})`;
}

function fmtTime(t) {
  if (!t) return '';
  return t.replace(/^(오전|오후)\s*/, '').replace(/:\d{2}$/, '');
}

// ===================== 이용 목록 렌더 =====================
function renderList() {
  const container = document.getElementById('active-list');
  const active = state.records.filter(r => r.active);

  if (active.length === 0) {
    container.innerHTML = `<div class="empty-box"><div class="ei">😊</div>현재 이용 중인 시설이 없습니다</div>`;
    return;
  }

  // 시설별 그룹핑
  const groups = {};
  active.forEach(r => {
    if (!groups[r.facility]) groups[r.facility] = [];
    groups[r.facility].push(r);
  });

  // PC는 별도 처리
  const FAC_ORDER = ['코인노래방', '닌텐도', '오락기', '포켓볼', '보드게임', 'PC'];
  const FAC_HDR = {
    '코인노래방': { cls: 'purple-hdr', emoji: '🎤' },
    '닌텐도': { cls: '', emoji: '🕹️' },
    '오락기': { cls: 'blue-hdr', emoji: '👾' },
    '포켓볼': { cls: 'amber-hdr', emoji: '🎱' },
    '보드게임': { cls: '', emoji: '🎲' },
    'PC': { cls: 'red-hdr', emoji: '💻' },
  };

  let html = '';

  FAC_ORDER.forEach(fac => {
    if (!groups[fac]) return;
    const h = FAC_HDR[fac] || { cls: '', emoji: '🎮' };

    if (fac === 'PC') {
      html += `<div class="fac-section">
        <div class="fac-header ${h.cls}">${h.emoji} PC 이용 현황</div>
        <div style="background:var(--bg);border:1px solid var(--bd);border-top:none;padding:12px;border-radius:0 0 10px 10px;">
          <div class="pc-grid-r">`;

      for (let i = 1; i <= 6; i++) {
        const k = 'PC' + i;
        const s = state.pcStatus[k] || { free: true };
        const rec = groups['PC']?.find(r => r.booth === k);
        if (s.free) {
          html += `<div class="pc-tile-r free"><div class="pt-num">${i}</div><div class="pt-user">비어있음</div></div>`;
        } else {
          html += `<div class="pc-tile-r busy">
            <div class="pt-num">${i}</div>
            <div class="pt-user">${s.user || '-'}</div>
            <div class="pt-btn"><button onclick="confirmReturn(${rec ? rec.id : 0},'PC','${k}','${s.user || ''}','${fmtTime(s.time||'')}','PC ${i}번')">반납</button></div>
          </div>`;
        }
      }
      html += `</div></div></div>`;
    } else {
      html += `<div class="fac-section"><div class="fac-header ${h.cls}">${h.emoji} ${fac}</div>`;
      groups[fac].forEach(r => {
        html += `<div class="active-item">
          <div class="ai-info">
            <div class="ai-name">${r.name} <span style="font-size:11px;color:var(--txt2);font-weight:400">${r.gender||''} ${r.grade||''}</span></div>
            <div class="ai-meta">📞 ${r.phone} · ⏰ ${fmtTime(r.time)} 이용 시작</div>
          </div>
          <div class="ai-booth">${r.booth}</div>
          <button class="return-btn" onclick="confirmReturn(${r.id},'${r.facility}','${r.booth}','${r.name}','${fmtTime(r.time)}','${r.facility} ${r.booth}')">반납</button>
        </div>`;
      });
      html += `</div>`;
    }
  });

  container.innerHTML = html;
}

// ===================== 반납 확인 =====================
function confirmReturn(recordId, facility, booth, name, startTime, label) {
  pendingReturn = { recordId, facility, booth };
  document.getElementById('confirm-name').textContent = name || '-';
  document.getElementById('confirm-meta').textContent = `${label} · 이용 시작: ${startTime}`;
  document.getElementById('ov-confirm').classList.add('open');
}
function closeConfirm() {
  pendingReturn = null;
  document.getElementById('ov-confirm').classList.remove('open');
}

async function doReturn() {
  if (!pendingReturn) return;
  const { recordId, facility, booth } = pendingReturn;
  closeConfirm();

  try {
    let res;
    if (facility === 'PC') {
      res = await fetch(SERVER + '/api/pc/end', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pcKey: booth })
      });
    } else {
      res = await fetch(SERVER + '/api/end', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ facility, booth })
      });
    }
    const d = await res.json();
    if (d.ok) {
      showSuccess(facility, booth);
    } else {
      toast('반납 오류: ' + (d.error || '알 수 없는 오류'));
    }
  } catch (e) {
    toast('서버 연결 오류');
  }
}

// ===================== 성공 애니메이션 =====================
function showSuccess(facility, booth) {
  const overlay = document.getElementById('success-overlay');
  document.getElementById('success-sub').textContent = `${facility} ${booth} 반납 완료`;
  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 2000);
}

// ===================== TOAST =====================
let _tt;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
</body>
</html>
